<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bismillah bisa</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    /* Styling untuk UI Skor */
    #score-board {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 999;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 20px;
      font-family: Arial, sans-serif;
      font-size: 24px;
      border-radius: 8px;
    }
    .message {
      font-size: 14px;
      color: yellow;
      display: none;
    }
  </style>

  <script>
    // Mendaftarkan komponen logika "distance-check"
    AFRAME.registerComponent('distance-check', {
      schema: {
        target1: {type: 'selector'}, // ID objek pertama
        target2: {type: 'selector'}, // ID objek kedua
        minDistance: {type: 'number', default: 0.5} // Jarak minimal untuk dapat poin (meter)
      },

      init: function() {
        this.score = 0;
        this.scoreElement = document.querySelector('#score-value');
        this.msgElement = document.querySelector('#msg');
        this.lastTimePointsAdded = 0; // Untuk cooldown agar poin tidak bertambah terlalu cepat
        
        // Helper vector untuk menyimpan posisi dunia (World Position)
        this.pos1 = new THREE.Vector3();
        this.pos2 = new THREE.Vector3();
      },

      tick: function(time, timeDelta) {
        // Ambil referensi ke elemen HTML target
        const el1 = this.data.target1;
        const el2 = this.data.target2;

        // Pastikan kedua objek sedang terlihat (tracked)
        if (!el1.object3D.visible || !el2.object3D.visible) {
            this.msgElement.style.display = 'none';
            return; 
        }

        // Dapatkan posisi absolut (World Position) dari kedua objek
        el1.object3D.getWorldPosition(this.pos1);
        el2.object3D.getWorldPosition(this.pos2);

        // Hitung jarak (Euclidean Distance)
        const distance = this.pos1.distanceTo(this.pos2);

        // Logika Poin
        if (distance < this.data.minDistance) {
            // Tampilkan pesan
            this.msgElement.style.display = 'block';
            this.msgElement.innerText = "Dekat! Menambahkan Poin...";

            // Tambahkan poin setiap 1 detik (1000ms) agar tidak spam
            if (time - this.lastTimePointsAdded > 1000) {
                this.score += 10;
                this.scoreElement.innerText = this.score;
                this.lastTimePointsAdded = time;
                
                // Efek visual sederhana (opsional): Skala membesar sebentar
                el1.setAttribute('animation', 'property: scale; to: 1.2 1.2 1.2; dur: 200; easing: easeInOutQuad; dir: alternate; loop: 2');
            }
        } else {
            this.msgElement.style.display = 'none';
        }
      }
    });
  </script>
</head>
<body>

  <div id="score-board">
    Skor: <span id="score-value">0</span>
    <div id="msg" class="message"></div>
  </div>

  <a-scene mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 2" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
    
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity id="target-one" mindar-image-target="targetIndex: 0">
      <a-box color="red" position="0 0 0" scale="0.5 0.5 0.5"></a-box>
    </a-entity>

    <a-entity id="target-two" mindar-image-target="targetIndex: 1">
       <a-sphere color="blue" position="0 0 0" scale="0.5 0.5 0.5"></a-sphere>
    </a-entity>

    <a-entity distance-check="target1: #target-one; target2: #target-two; minDistance: 2.0"></a-entity>

  </a-scene>
</body>

</html>
